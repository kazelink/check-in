name = "check-in"
main        = "src/index.js"
compatibility_date = "2025-12-01"

[[d1_databases]]
binding       = "DB"
database_name = "checkin-db"
# database_id 不需要提交到仓库：
#   - 线上部署（npm run deploy）会自动查找/创建同名 D1 并注入 ID
#   - 本地开发（npm run dev）如报缺少 database_id，取消下行注释并填入你的 ID（勿提交）
# database_id = ""

[assets]
directory = "./public"
